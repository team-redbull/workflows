# Test-only stand-in for the real "next" (firewall) service (see
# dev/mock-connectivity/app.py). Deploy this chart only where the real next
# service is unreachable (e.g. an OpenShift e2e/test environment) and point
# helm/connectivity's config.nextUrl at this chart's Service instead; production
# must point config.nextUrl at the real service and never install this chart.
#
# This chart never creates or names a Namespace: it deploys into whichever
# namespace the release targets (`helm install -n <ns>`, or the release's
# `namespace:` field in redbull-platform's helmfile).

image:
  repository: ghcr.io/team-redbull/mock-connectivity
  tag: v0.1.0
  pullPolicy: IfNotPresent

# State (pending request ids) is in-memory only — one replica only, or
# requests submitted to one pod never resolve when polled against another.
replicas: 1

service:
  port: 9000

# NOTE: the simulated approval delay (COMPLETION_DELAY_SECONDS) deliberately
# does NOT live here. It is defined directly in templates/config.yaml — the
# ConfigMap is the operator's edit surface for it (edit + restart the
# deployment, no rebuild, no chart re-render), mirroring helm/connectivity's
# PORTS_* knob.
