{{- if .Values.mockGenerator.enabled }}
# LOCAL DEV ONLY: deploys the mock IPAM that config.generatorUrl points at by
# default. Do NOT enable this in environments where the real external generator
# exists — there, generatorUrl targets that team's service instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: segment-generator
  namespace: {{ .Values.namespace }}
  labels:
    app: segment-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: segment-generator
  template:
    metadata:
      labels:
        app: segment-generator
    spec:
      containers:
        - name: segment-generator
          image: "{{ .Values.mockGenerator.image.repository }}:{{ .Values.mockGenerator.image.tag }}"
          imagePullPolicy: {{ .Values.mockGenerator.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mockGenerator.port }}
          env:
            - name: SEGMENT_MANAGER_URL
              valueFrom:
                configMapKeyRef:
                  name: orchestrator-config
                  key: SEGMENT_MANAGER_URL
            - name: SITE_PREFIXES
              value: {{ .Values.mockGenerator.sitePrefixes | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: segment-generator
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: segment-generator
  ports:
    - port: {{ .Values.mockGenerator.port }}
      targetPort: {{ .Values.mockGenerator.port }}
{{- end }}
