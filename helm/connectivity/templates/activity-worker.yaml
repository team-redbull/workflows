# The connectivity activity "limb": its own deployment, ServiceAccount and
# Segments Manager token. Heavy/domain deps and secrets live here, not in the brain.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connectivity-activity-worker
  namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-activity-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: connectivity-activity-worker
spec:
  replicas: {{ .Values.activityWorker.replicas }}
  selector:
    matchLabels:
      app: connectivity-activity-worker
  template:
    metadata:
      labels:
        app: connectivity-activity-worker
    spec:
      serviceAccountName: connectivity-activity-worker
      containers:
        - name: connectivity-activity-worker
          image: "{{ .Values.activityWorker.image.repository }}:{{ .Values.activityWorker.image.tag }}"
          imagePullPolicy: {{ .Values.activityWorker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: orchestrator-config
            - secretRef:
                name: segment-manager-token
