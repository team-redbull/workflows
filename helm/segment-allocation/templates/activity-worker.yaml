# The segment-allocation activity "limb": its own deployment and ServiceAccount.
# Heavy/domain deps and (future) secrets live here, not in the brain.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: segment-activity-worker
  namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: segment-activity-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: segment-activity-worker
spec:
  replicas: {{ .Values.activityWorker.replicas }}
  selector:
    matchLabels:
      app: segment-activity-worker
  template:
    metadata:
      labels:
        app: segment-activity-worker
    spec:
      serviceAccountName: segment-activity-worker
      containers:
        - name: segment-activity-worker
          image: "{{ .Values.activityWorker.image.repository }}:{{ .Values.activityWorker.image.tag }}"
          imagePullPolicy: {{ .Values.activityWorker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: orchestrator-config
