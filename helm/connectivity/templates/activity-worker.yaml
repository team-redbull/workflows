# The connectivity activity "limb": its own deployment, ServiceAccount and
# Segments Manager token. Heavy/domain deps and secrets live here, not in the brain.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connectivity-activity-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-activity-worker
  labels:
    app: connectivity-activity-worker
spec:
  replicas: {{ .Values.activityWorker.replicas }}
  selector:
    matchLabels:
      app: connectivity-activity-worker
  template:
    metadata:
      labels:
        app: connectivity-activity-worker
    spec:
      serviceAccountName: connectivity-activity-worker
      containers:
        - name: connectivity-activity-worker
          image: "{{ .Values.activityWorker.image.repository }}:{{ .Values.activityWorker.image.tag }}"
          imagePullPolicy: {{ .Values.activityWorker.image.pullPolicy }}
          envFrom:
            # Global config (Temporal + DOMAIN + SEGMENTS_MANAGER_URL), owned by
            # the workflow-worker chart — install that release first, or this
            # pod stalls in CreateContainerConfigError on the missing ConfigMap.
            - configMapRef:
                name: orchestrator-config
            # Connectivity-specific endpoints + port policy, owned by this chart.
            - configMapRef:
                name: connectivity-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default "segments-manager-token" }}
