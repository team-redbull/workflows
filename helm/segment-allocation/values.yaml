# Default values target the local kind cluster (prep-temporal), where the
# Temporal server runs on the host and is reached via host.docker.internal.
# For OpenShift, override config.* (e.g. via values-openshift.yaml or --set) —
# the images and templates stay the same.

namespace: segment-allocation

config:
  temporalHost: "host.docker.internal:7233"
  temporalNamespace: "default"
  # Deployments API (segment allocation, Step 1). Base host only; the
  # /api/v2/projects/{PROJECT_ID}/groups/{GROUP}/deployments path is composed
  # from projectId + group at request time.
  deploymentApiUrl: "https://america.com"
  deploymentProjectId: "REPLACE_ME"
  deploymentGroup: "REPLACE_ME"

workflowWorker:
  image:
    repository: ghcr.io/team-redbull/workflows/segment-allocation-workflow
    tag: latest
    pullPolicy: Always
  replicas: 1

activityWorker:
  image:
    repository: ghcr.io/team-redbull/workflows/segment-allocation-activity
    tag: latest
    pullPolicy: Always
  replicas: 1
