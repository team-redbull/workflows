# Endpoint configuration. This is the ONLY place environment-specific values live
# (here: local kind, reaching host services via host.docker.internal). For OpenShift,
# install this chart with different `config.*` values — the images do not change.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: {{ .Values.namespace }}
data:
  TEMPORAL_HOST: {{ .Values.config.temporalHost | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.config.temporalNamespace | quote }}
  SEGMENT_MANAGER_URL: {{ .Values.config.segmentManagerUrl | quote }}
  GENERATOR_URL: {{ .Values.config.generatorUrl | quote }}
---
# Credentials for the Segments Manager. Replace for non-local environments.
apiVersion: v1
kind: Secret
metadata:
  name: segments-manager-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  SEGMENTS_USER: {{ .Values.secrets.segmentsUser | quote }}
  SEGMENTS_PASSWORD: {{ .Values.secrets.segmentsPassword | quote }}
