# Default values target the local kind cluster, where the Temporal server
# runs on the host and is reached via host.docker.internal. For OpenShift,
# override config.* — the image and templates stay the same.
#
# This chart never creates or names a Namespace: it deploys into whichever
# namespace the release targets (`helm install -n <ns>`, or the release's
# `namespace:` field in redbull-platform's helmfile). On redbull-platform that
# namespace (redbull-workflows) is pre-created by its own `namespaces` release;
# standalone, pass `--create-namespace` to `helm install`.

config:
  temporalHost: "host.docker.internal:7233"
  temporalNamespace: "default"
image:
  repository: ghcr.io/team-redbull/connectivity-workflow
  tag: v1.0.17
  pullPolicy: IfNotPresent
replicas: 3
# The connectivity-workflow trigger API (api.py), run from the same image as a
# separate Deployment + Service named `connectivity-api`. The Segments Manager
# points CONNECTIVITY_WORKFLOW_API_URL at this Service so segment creation can
# start the workflow in-cluster.
connectivityApi:
  enabled: true
  replicas: 1
  port: 8080
