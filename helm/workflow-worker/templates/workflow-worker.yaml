# The lightweight "brain": runs workflows only, for every workflow domain
# registered in workflows/main_worker_init.py. Its own ServiceAccount per the
# RBAC-isolation requirement (no Segments Manager token, no next URLs mounted —
# it never makes those calls; activities do).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-worker
  labels:
    app: workflow-worker
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: workflow-worker
  template:
    metadata:
      labels:
        app: workflow-worker
    spec:
      serviceAccountName: workflow-worker
      containers:
        - name: workflow-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: workflow-worker-config
