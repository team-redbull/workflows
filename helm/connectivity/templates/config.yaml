# connectivity-config: the per-workflow ConfigMap for the connectivity domain.
# Holds ONLY connectivity-specific endpoints + policy. Values shared across all
# domains (Temporal, DOMAIN, SEGMENTS_MANAGER_URL) live in the global
# `orchestrator-config` owned by the workflow-worker chart, which the activity
# worker also mounts. Every key equals a ConnectivityActivitySettings field
# (uppercased) — keep shared/settings.py and this file aligned.
apiVersion: v1
kind: ConfigMap
metadata:
  name: connectivity-config
data:
  NEXT_URL: {{ .Values.config.nextUrl | quote }}
  NEXT_TOKEN_RENEWAL_URI: {{ .Values.config.nextTokenRenewalUri | quote }}
  NEXT_OPEN_RULES_URI: {{ .Values.config.nextOpenRulesUri | quote }}
  NEXT_CHECK_STATUS_URI: {{ .Values.config.nextCheckStatusUri | quote }}
  # -- Port policy per rule direction (the operator's edit surface) ----------
  # Compact JSON per protocol: {"tcp": ["PORT", "START-END", ...], "udp": [...]}.
  # The activity layer expands this into the next API's ports structure, and
  # validates the syntax at worker startup (a bad edit crash-loops the activity
  # worker instead of failing a workflow hours in). Changing ports requires
  # only a restart of the activity workers — no image rebuild.
  PORTS_HC_TO_MCE: '{"tcp": ["30000-32767"], "udp": ["9000"]}'
  PORTS_MCE_TO_HC: '{"tcp": ["6443", "30000-32767"]}'
  PORTS_INVENTORY_TO_MCE: '{"tcp": ["30000-32767"], "udp": ["9000"]}'
  PORTS_MCE_TO_INVENTORY: '{"tcp": ["6443", "30000-32767"]}'
  PORTS_PXE_TO_MCE: '{"tcp": ["30000-32767"], "udp": ["9000"]}'
  PORTS_MCE_TO_PXE: '{"tcp": ["6443", "30000-32767"]}'
{{- if not .Values.secrets.existingSecret }}
---
# Bearer token for mutating Segments Manager calls. Replace for non-local envs.
# Skipped when secrets.existingSecret is set (the token then lives in an
# out-of-band Secret this chart neither creates nor owns).
apiVersion: v1
kind: Secret
metadata:
  name: segments-manager-token
type: Opaque
stringData:
  SEGMENTS_MANAGER_API_TOKEN: {{ .Values.secrets.segmentsManagerApiToken | quote }}
{{- end }}
