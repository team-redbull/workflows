name: Build and Push

# Three images from this one repo: the workflow "brain" (workflows/Dockerfile),
# the segment-connectivity activity "limb" (activities/segment_connectivity/Dockerfile), and
# the test-only mock of the next service (dev/mock-segment-connectivity/Dockerfile),
# deployed via helm/mock-segment-connectivity for e2e testing (see CLAUDE.md section 4).

on:
  push:
    branches: [ '**' ]
  delete:

permissions:
  contents: write
  packages: write

jobs:
  build-workflow-brain:
    if: github.event_name == 'push'
    uses: team-redbull/.github/.github/workflows/ghcr-build-push.yml@main
    with:
      image-name: workflows
      dockerfile: workflows/Dockerfile
      helm-values-path: helm/workflows/values.yaml
      helm-image-path: image
    secrets: inherit

  build-segment-connectivity:
    if: github.event_name == 'push'
    # Sequential, not parallel: both calls bump the same shared vX.Y.Z git
    # tag and commit+push to the same branch; running in parallel races.
    needs: build-workflow-brain
    uses: team-redbull/.github/.github/workflows/ghcr-build-push.yml@main
    with:
      image-name: segment-connectivity
      dockerfile: activities/segment_connectivity/Dockerfile
      helm-values-path: helm/segment-connectivity/values.yaml
      helm-image-path: activityWorker.image
    secrets: inherit

  build-mock-segment-connectivity:
    if: github.event_name == 'push'
    # Sequential, not parallel: all three calls bump the same shared vX.Y.Z git
    # tag and commit+push to the same branch; running in parallel races.
    needs: build-segment-connectivity
    uses: team-redbull/.github/.github/workflows/ghcr-build-push.yml@main
    with:
      image-name: mock-segment-connectivity
      dockerfile: dev/mock-segment-connectivity/Dockerfile
      helm-values-path: helm/mock-segment-connectivity/values.yaml
      helm-image-path: image
    secrets: inherit

  cleanup-workflow-brain-on-delete:
    if: github.event_name == 'delete'
    uses: team-redbull/.github/.github/workflows/ghcr-cleanup-on-delete.yml@main
    with:
      image-name: workflows
    secrets: inherit

  cleanup-segment-connectivity-on-delete:
    if: github.event_name == 'delete'
    uses: team-redbull/.github/.github/workflows/ghcr-cleanup-on-delete.yml@main
    with:
      image-name: segment-connectivity
    secrets: inherit

  cleanup-mock-segment-connectivity-on-delete:
    if: github.event_name == 'delete'
    uses: team-redbull/.github/.github/workflows/ghcr-cleanup-on-delete.yml@main
    with:
      image-name: mock-segment-connectivity
    secrets: inherit
