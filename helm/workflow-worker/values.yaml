# Default values target the local kind cluster, where the Temporal server
# runs on the host and is reached via host.docker.internal. For OpenShift,
# override config.* — the image and templates stay the same.
#
# This chart owns `orchestrator-config`, the GLOBAL ConfigMap shared by every
# workflow domain: the Temporal connection plus the domain tag and Segments
# Manager URL that all domains reuse. The brain itself only needs TEMPORAL_*;
# domain/segmentsManagerUrl live here so activity limbs (e.g. connectivity) can
# mount this one ConfigMap instead of each duplicating those values.
#
# This chart never creates or names a Namespace: it deploys into whichever
# namespace the release targets (`helm install -n <ns>`, or the release's
# `namespace:` field in redbull-platform's helmfile). On redbull-platform that
# namespace (redbull-workflows) is pre-created by its own `namespaces` release;
# standalone, pass `--create-namespace` to `helm install`.

config:
  temporalHost: "host.docker.internal:7233"
  temporalNamespace: "default"
  # Segments Manager base URL, shared by every domain's activities.
  segmentsManagerUrl: "http://host.docker.internal:8000"
  # Operator "domain" tag stamped into workflow payloads (e.g. next open-rules).
  domain: "domain1"
image:
  repository: ghcr.io/team-redbull/connectivity-workflow
  tag: v1.0.23
  pullPolicy: IfNotPresent
replicas: 3
# The SHARED workflow trigger API (api.py), run from the same image as a single
# Deployment + Service named `workflows-api` that fronts EVERY workflow domain
# (a new domain adds a route to api.py, not a new pod). Callers such as the
# Segments Manager point their *_WORKFLOW_API_URL at this Service so an event
# (e.g. segment creation) can start a workflow in-cluster.
workflowsApi:
  enabled: true
  replicas: 1
  port: 8080
