apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-connectivity-config
data:
  # Simulated human-approval delay (seconds) before a submitted request flips
  # from "pending" to "complete" — the operator's edit surface for tuning e2e
  # test timing. Edit here + restart the deployment; no image rebuild, no
  # chart re-render (mirrors helm/connectivity's PORTS_* knob).
  COMPLETION_DELAY_SECONDS: "60"
